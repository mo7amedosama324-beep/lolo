<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ سؤال مهم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .heart {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
            animation: heartbeat 1.5s ease-in-out infinite;
        }

        .heart::before,
        .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 150px;
            height: 240px;
            background: #ff6b9d;
            border-radius: 150px 150px 0 0;
            box-shadow: 0 10px 40px rgba(255, 107, 157, 0.5);
        }

        .heart::before {
            left: 150px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .question {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            z-index: 10;
            white-space: nowrap;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-top: 50px;
            position: relative;
            height: 80px;
        }

        button {
            padding: 15px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }

        #yesBtn {
            background: linear-gradient(135deg, #81ff89 0%, #2dce89 100%);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(45, 206, 137, 0.5);
        }

        #noBtn {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a52 100%);
            color: white;
            position: absolute;
            transition: all 0.1s ease;
        }

        .message {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .message-content {
            background: white;
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.5s ease;
        }

        .message-content h1 {
            font-size: 48px;
            color: #ff6b9d;
            margin-bottom: 20px;
        }

        .message-content p {
            font-size: 32px;
            color: #667eea;
            font-weight: bold;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1); }
            20%, 40% { transform: scale(1); }
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
        }

        .floating-heart {
            position: absolute;
            font-size: 30px;
            animation: float 4s linear infinite;
            opacity: 0;
        }

        @keyframes float {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heart">
            <div class="question">بتحبيني؟ ❤️</div>
        </div>
        
        <div class="buttons">
            <button id="yesBtn">نعم 😍</button>
            <button id="noBtn">لا 😢</button>
        </div>
    </div>

    <div class="message" id="message">
        <div class="message-content">
            <h1>يااااي! 🎉</h1>
            <p>أنا كمان بحبك أوي! ❤️❤️❤️</p>
        </div>
    </div>

    <div class="floating-hearts" id="floatingHearts"></div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const message = document.getElementById('message');
        const floatingHearts = document.getElementById('floatingHearts');

        // Make "No" button run away on hover or click
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);

        function moveButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth - 100;
            const maxY = window.innerHeight - noBtn.offsetHeight - 100;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        // Show message when "Yes" is clicked
        yesBtn.addEventListener('click', function() {
            message.style.display = 'flex';
            createFloatingHearts();
        });

        // Create floating hearts animation
        function createFloatingHearts() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.className = 'floating-heart';
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + '%';
                    heart.style.animationDelay = Math.random() * 2 + 's';
                    floatingHearts.appendChild(heart);
                    
                    setTimeout(() => heart.remove(), 4000);
                }, i * 200);
            }
        }

        // Close message when clicked
        message.addEventListener('click', function() {
            message.style.display = 'none';
        });
    </script>
</body>
</html>
